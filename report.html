<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日報入力</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(135deg, #1565c0 0%, #1976d2 100%);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 16px;
}
.card {
  background: white; border-radius: 24px; padding: 28px 22px;
  width: 100%; max-width: 480px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}
.card-title { font-size: 1.4rem; font-weight: 700; color: #1565c0; text-align: center; margin-bottom: 4px; }
.card-sub   { color: #888; font-size: 0.85rem; text-align: center; margin-bottom: 24px; }

/* ログイン */
#loginScreen {}
.login-input {
  width: 100%; padding: 16px; border: 2px solid #e0e0e0; border-radius: 14px;
  font-size: 2rem; text-align: center; letter-spacing: 0.3em; color: #1565c0;
  font-weight: 700; margin-bottom: 14px; outline: none;
}
.login-input:focus { border-color: #1976d2; }
.btn-login {
  width: 100%; padding: 16px; background: linear-gradient(135deg, #1565c0, #1976d2);
  color: white; border: none; border-radius: 14px;
  font-size: 1.1rem; font-weight: 700; cursor: pointer;
}
.login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 10px; text-align: center; display: none; }

/* 日報 */
#reportScreen { display: none; }
.user-badge {
  text-align: center; padding: 10px 16px; background: #e3f2fd;
  border-radius: 10px; font-weight: 700; color: #1565c0;
  font-size: 1rem; margin-bottom: 18px;
}
.date-nav {
  display: flex; align-items: center; justify-content: space-between;
  background: #f5f5f5; border-radius: 12px; padding: 10px 16px; margin-bottom: 18px;
}
.date-nav-btn {
  background: none; border: none; font-size: 1.5rem; cursor: pointer;
  color: #1976d2; padding: 2px 10px; font-weight: 700;
}
.date-nav-btn:disabled { color: #ccc; cursor: not-allowed; }
.date-label { font-size: 1rem; font-weight: 700; color: #2c3e50; }

.sec-title {
  font-size: 0.88rem; font-weight: 700; color: #555;
  margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #e3f2fd;
}

/* 業務チェック */
.task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.task-btn {
  padding: 14px 6px; border: 2px solid #e0e0e0; border-radius: 12px;
  background: white; font-size: 0.9rem; font-weight: 600; color: #555;
  cursor: pointer; transition: all 0.12s; text-align: center;
}
.task-btn.on { border-color: #1976d2; background: #e3f2fd; color: #1565c0; }
.task-btn:active { transform: scale(0.97); }

/* 体調 */
.stress-row { display: flex; gap: 8px; margin-bottom: 18px; }
.stress-btn {
  flex: 1; padding: 14px 4px; border: 2px solid #e0e0e0; border-radius: 12px;
  background: white; cursor: pointer; text-align: center; transition: all 0.12s;
}
.stress-btn span.ico  { font-size: 1.8rem; display: block; margin-bottom: 4px; }
.stress-btn span.lbl  { font-size: 0.75rem; font-weight: 600; color: #666; display: block; }
.stress-btn.s-good   { border-color: #2e7d32; background: #e8f5e9; }
.stress-btn.s-normal { border-color: #f57f17; background: #fff8e1; }
.stress-btn.s-bad    { border-color: #c62828; background: #ffebee; }

/* テキスト入力 */
.note-area {
  width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px;
  font-size: 0.95rem; font-family: inherit; resize: none; outline: none; margin-bottom: 18px;
}
.note-area:focus { border-color: #1976d2; }

/* ボタン群 */
.report-btns { display: flex; flex-direction: column; gap: 10px; }
.btn-save-next {
  padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #1565c0, #1976d2);
  color: white; font-size: 1rem; font-weight: 700; cursor: pointer;
}
.btn-save-done {
  padding: 14px; border: 2px solid #1976d2; border-radius: 14px;
  background: white; color: #1976d2; font-size: 0.95rem; font-weight: 700; cursor: pointer;
}
.btn-logout {
  padding: 12px; border: 1px solid #ddd; border-radius: 12px;
  background: white; color: #999; font-size: 0.88rem; cursor: pointer;
}

/* トースト */
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1565c0; color: white; padding: 14px 24px;
  border-radius: 12px; font-size: 0.95rem; font-weight: 600;
  transition: transform 0.3s; z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok   { background: #2e7d32; }
.toast.err  { background: #c62828; }
</style>
</head>
<body>

<!-- ログイン -->
<div class="card" id="loginScreen">
  <div class="card-title">📝 日報入力</div>
  <div class="card-sub">ログインコードを入力してください</div>
  <input type="tel" class="login-input" id="loginCode" placeholder="----" maxlength="4"
    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn-login" onclick="doLogin()">ログイン</button>
  <p class="login-error" id="loginErr">ログインコードが違います</p>
</div>

<!-- 日報 -->
<div class="card" id="reportScreen">
  <div class="user-badge" id="uBadge"></div>

  <div class="date-nav">
    <button class="date-nav-btn" id="prevBtn" onclick="shiftDate(-1)">‹</button>
    <div class="date-label" id="dateLbl"></div>
    <button class="date-nav-btn" id="nextBtn" onclick="shiftDate(1)">›</button>
  </div>

  <div class="sec-title">業務内容（複数選択可）</div>
  <div class="task-grid" id="taskGrid"></div>

  <div class="sec-title">今日の体調・気分</div>
  <div class="stress-row">
    <button class="stress-btn" id="sg" onclick="setStress('good')">
      <span class="ico">😊</span><span class="lbl">良好</span>
    </button>
    <button class="stress-btn" id="sn" onclick="setStress('normal')">
      <span class="ico">😐</span><span class="lbl">普通</span>
    </button>
    <button class="stress-btn" id="sb" onclick="setStress('bad')">
      <span class="ico">😔</span><span class="lbl">しんどい</span>
    </button>
  </div>

  <div class="sec-title">メモ・連絡事項（任意）</div>
  <textarea class="note-area" id="noteArea" rows="3" placeholder="連絡事項や気になったことがあれば..."></textarea>

  <div class="report-btns">
    <button class="btn-save-next" onclick="save(false)">💾 保存して別の日も入力する</button>
    <button class="btn-save-done" onclick="save(true)">✅ 完了して終わる</button>
    <button class="btn-logout" onclick="logout()">ログアウト</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB='https://ntiapbggpzczmbnoiues.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50aWFwYmdncHpjem1ibm9pdWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTAyMDcsImV4cCI6MjA5MDQ4NjIwN30.2u742yLu2YHh00zm3CLOLZ98GH8u0dpKunXNsuDvcu4';
const H={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'};
const TASKS=['洗車','コーティング','アンダーコート','研磨','タイヤ交換・組換え','掃除','研修','その他'];

let cUser=null,rDate=new Date(),selTasks=[],selStress=null;

function pad(n){return String(n).padStart(2,'0');}
function ds(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}

async function doLogin(){
  const code=document.getElementById('loginCode').value.trim();
  if(!code)return;
  document.getElementById('loginErr').style.display='none';
  const r=await fetch(`${SB}/rest/v1/users?login_code=eq.${encodeURIComponent(code)}&user_type=eq.user&status=eq.active&limit=1`,{headers:H});
  const rows=await r.json();
  if(!rows||!rows.length){document.getElementById('loginErr').style.display='block';return;}
  cUser=rows[0];
  rDate=new Date();
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('reportScreen').style.display='block';
  document.getElementById('uBadge').textContent=cUser.name+' さんの日報';
  renderDate();renderTasks();loadExisting();
}

function renderDate(){
  const days=['日','月','火','水','木','金','土'];
  const d=rDate;
  document.getElementById('dateLbl').textContent=`${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
  const today=new Date();today.setHours(0,0,0,0);
  const t=new Date(d);t.setHours(0,0,0,0);
  const diff=(today-t)/86400000;
  document.getElementById('prevBtn').disabled=diff>=14;
  document.getElementById('nextBtn').disabled=diff<=0;
}

function renderTasks(){
  const g=document.getElementById('taskGrid');
  g.innerHTML='';
  TASKS.forEach(t=>{
    const b=document.createElement('button');
    b.className='task-btn'+(selTasks.includes(t)?' on':'');
    b.textContent=t;
    b.onclick=()=>{
      if(selTasks.includes(t)){selTasks=selTasks.filter(x=>x!==t);b.classList.remove('on');}
      else{selTasks.push(t);b.classList.add('on');}
    };
    g.appendChild(b);
  });
}

function setStress(lv){
  selStress=lv;
  document.getElementById('sg').className='stress-btn'+(lv==='good'?' s-good':'');
  document.getElementById('sn').className='stress-btn'+(lv==='normal'?' s-normal':'');
  document.getElementById('sb').className='stress-btn'+(lv==='bad'?' s-bad':'');
}

function shiftDate(d){
  const nd=new Date(rDate);nd.setDate(nd.getDate()+d);
  rDate=nd;selTasks=[];selStress=null;
  document.getElementById('noteArea').value='';
  setStress(null);renderDate();renderTasks();loadExisting();
}

async function loadExisting(){
  const d=ds(rDate);
  const r=await fetch(`${SB}/rest/v1/daily_reports?user_id=eq.${cUser.id}&date=eq.${d}&limit=1`,{headers:H});
  const rows=await r.json();
  if(!rows||!rows[0])return;
  const rep=rows[0];
  selTasks=rep.tasks||[];selStress=rep.stress_level||null;
  document.getElementById('noteArea').value=rep.note||'';
  if(selStress)setStress(selStress);
  renderTasks();
}

async function save(andClose){
  const d=ds(rDate);
  const data={
    user_id:cUser.id,date:d,tasks:selTasks,
    stress_level:selStress,note:document.getElementById('noteArea').value,
    content:selTasks.join('・')||'記録なし',
    store:null
  };
  const chk=await fetch(`${SB}/rest/v1/daily_reports?user_id=eq.${cUser.id}&date=eq.${d}&limit=1`,{headers:H});
  const ex=await chk.json();
  if(ex&&ex[0]){await fetch(`${SB}/rest/v1/daily_reports?id=eq.${ex[0].id}`,{method:'PATCH',headers:H,body:JSON.stringify(data)});}
  else{await fetch(`${SB}/rest/v1/daily_reports`,{method:'POST',headers:H,body:JSON.stringify(data)});}
  toast('日報を保存しました','ok');
  if(andClose)logout();
}

function logout(){
  cUser=null;selTasks=[];selStress=null;
  document.getElementById('reportScreen').style.display='none';
  document.getElementById('loginScreen').style.display='block';
  document.getElementById('loginCode').value='';
}

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),2500);
}
</script>
</body>
</html>
