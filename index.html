<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A型就労支援システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px;
}
.logo { text-align: center; margin-bottom: 28px; }
.logo h1 { color: white; font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
.logo p  { color: rgba(255,255,255,0.75); font-size: 0.85rem; }
.cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
.card {
  background: white; border-radius: 18px; padding: 20px 20px;
  display: flex; align-items: center; gap: 16px;
  text-decoration: none; color: #2c3e50;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
.card-icon {
  width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; color: white;
}
.ic1 { background: linear-gradient(135deg, #2e7d32, #4caf50); }
.ic2 { background: linear-gradient(135deg, #1565c0, #1976d2); }
.ic3 { background: linear-gradient(135deg, #4a148c, #7b1fa2); }
.ic4 { background: linear-gradient(135deg, #2c3e50, #34495e); }
.card-text h2 { font-size: 1rem; font-weight: 700; margin-bottom: 3px; }
.card-text p  { font-size: 0.78rem; color: #888; }
.divider { width: 100%; max-width: 360px; text-align: center; color: rgba(255,255,255,0.5); font-size: 0.8rem; margin: 4px 0; }
</style>
</head>
<body>
<div class="logo">
  <h1>🏢 A型就労支援システム</h1>
  <p>使う画面を選んでください</p>
</div>
<div class="cards">
  <a href="timecard.html" class="card">
    <div class="card-icon ic1"><i class="fas fa-clock"></i></div>
    <div class="card-text">
      <h2>タイムカード打刻</h2>
      <p>出退勤の打刻（共有iPad用）</p>
    </div>
  </a>
  <a href="report.html" class="card">
    <div class="card-icon ic2"><i class="fas fa-pen"></i></div>
    <div class="card-text">
      <h2>日報入力</h2>
      <p>業務内容・体調の記録（個人端末用）</p>
    </div>
  </a>
  <div class="divider">── 指導員 ──</div>
  <a href="timecard_manager.html" class="card">
    <div class="card-icon ic3"><i class="fas fa-id-badge"></i></div>
    <div class="card-text">
      <h2>指導員タイムカード</h2>
      <p>出退勤打刻・位置情報記録</p>
    </div>
  </a>
  <a href="manager.html" class="card">
    <div class="card-icon ic4"><i class="fas fa-user-shield"></i></div>
    <div class="card-text">
      <h2>指導員管理画面</h2>
      <p>シフト・勤怠・給与計算（PC推奨）</p>
    </div>
  </a>
</div>
</body>
</html>
